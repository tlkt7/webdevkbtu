<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List for Ibrahim</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <span class="site-header__title">To Do List for Ibrahim</span>
    </header>

    <main class="main">
      <section class="todo-card">
        <h1 class="todo-card__heading">To Do List for Ibrahim</h1>

        <form class="todo-form" id="todoForm">
          <label for="taskInput" class="visually-hidden">New task</label>
          <input
            class="todo-form__input"
            type="text"
            id="taskInput"
            placeholder="New Task"
            autocomplete="off"
          />
          <button class="todo-form__btn" type="submit">Add</button>
        </form>

        <ul class="todo-list" id="todoList"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
